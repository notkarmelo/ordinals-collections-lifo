name: Slug conflict review

on:
  pull_request_target:
    paths:
      - collections.json

permissions:
  pull-requests: write

jobs:
  check-slugs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Save base collections.json and trusted scripts
        run: |
          cp collections.json /tmp/base-collections.json
          cp -r scripts /tmp/trusted-scripts
          cp -r legacy /tmp/trusted-legacy

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Restore trusted scripts and legacy data
        run: |
          cp -r /tmp/trusted-scripts/* scripts/
          cp -r /tmp/trusted-legacy/* legacy/

      - name: Check slug conflicts
        id: check
        run: |
          BASE_JSON=$(cat /tmp/base-collections.json)
          OUTPUT=$(BASE_COLLECTIONS_JSON="$BASE_JSON" node scripts/check-slug-conflicts.js)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: fromJSON(steps.check.outputs.result).found[0] != null
        uses: actions/github-script@v7
        with:
          script: |
            const result = ${{ steps.check.outputs.result }};
            const rows = result.found.map(entry => {
              const legacy = entry.legacyMatch ? '⚠️ Yes' : '—';
              const satflow = entry.satflowMatch
                ? `⚠️ [Yes](${entry.satflowUrl})`
                : '—';
              const ordinalswallet = entry.ordinalswalletMatch
                ? `⚠️ [Yes](${entry.ordinalswalletUrl})`
                : '—';
              return `| \`${entry.slug}\` | ${legacy} | ${satflow} | ${ordinalswallet} |`;
            });

            const body = [
              '## Slug Conflict Check',
              '',
              'The following new slugs conflict with existing listings:',
              '',
              '| Slug | Legacy (Magic Eden) | Satflow | Ordinals Wallet |',
              '|------|-------------------|---------|-----------------|',
              ...rows,
              '',
              '_This is informational only and does not block merging._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Slug Conflict Check')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
